name: docs-check

on:
  push:
    branches: [main, 'v*']
  pull_request:
    branches: [main]
  schedule:
    - cron: '0 0 * * 0'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  link-check-internal:
    name: Link check (internal, PR gate)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Run lychee (offline — internal links only)
        uses: lycheeverse/lychee-action@v2
        with:
          args: >-
            --verbose
            --no-progress
            --offline
            --exclude-path docs/superpowers
            'README.md'
            'docs/**/*.md'
            'plugin/**/*.md'
            'CHANGELOG.md'
            'templates/**/*.md'
          fail: true
          token: ${{ secrets.GITHUB_TOKEN }}

  link-check-external:
    name: Link check (external, scheduled)
    if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Restore lychee cache
        uses: actions/cache@v5
        with:
          path: .lycheecache
          key: cache-lychee-${{ github.sha }}
          restore-keys: cache-lychee-

      - name: Run lychee (full network check)
        uses: lycheeverse/lychee-action@v2
        with:
          args: >-
            --verbose
            --no-progress
            --cache
            --max-cache-age 1d
            --exclude-path docs/superpowers
            'README.md'
            'docs/**/*.md'
            'plugin/**/*.md'
            'CHANGELOG.md'
            'templates/**/*.md'
          fail: true
          token: ${{ secrets.GITHUB_TOKEN }}

  frontmatter-parity:
    name: Frontmatter version parity
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v6
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install pyyaml==6.0.2

      - name: Check frontmatter parity
        run: python .github/scripts/check-frontmatter-parity.py

  json-schema:
    name: JSON schema validation
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v6
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install jsonschema==4.23.0 requests==2.32.3

      - name: Validate JSON schemas
        run: python .github/scripts/check-json-schemas.py

  registry-lint:
    name: Recommendation Registry lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v6
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install jsonschema==4.23.0

      - name: Lint recommendation registry
        run: python .github/scripts/check-recommendation-registry.py

  skill-stability-lint:
    name: Skill interface stability lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v6
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install pyyaml==6.0.2

      - name: Lint skill interface stability
        run: python .github/scripts/check-skill-stability.py

  i18n-parity:
    name: i18n structural parity
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v6
        with:
          python-version: '3.11'

      - name: Check i18n parity
        run: python .github/scripts/check-i18n-parity.py

  shellcheck:
    name: shellcheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Run shellcheck
        uses: ludeeus/action-shellcheck@master
        with:
          severity: error
          ignore_paths: >-
            .git
            docs/superpowers
            node_modules

  encoding-check:
    name: Encoding corruption check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Check for U+FFFD replacement characters
        run: |
          set -e
          MATCHES=$(find . -type f \
            \( -name '*.md' -o -name '*.json' -o -name '*.sh' -o -name '*.yml' -o -name '*.yaml' \) \
            -not -path './.git/*' \
            -not -path './docs/superpowers/*' \
            -not -path './node_modules/*' \
            -exec grep -lP '\xef\xbf\xbd' {} + 2>/dev/null || true)
          if [ -n "$MATCHES" ]; then
            echo "::error::Encoding corruption (U+FFFD) found in:"
            echo "$MATCHES" | sed 's/^/  /'
            exit 1
          fi
          echo "OK: no encoding corruption found."

  preflight-schema:
    name: Preflight schema probe (profile schema closure)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v6
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install jsonschema==4.23.0

      - name: Run preflight schema probe
        run: |
          python ci/scripts/preflight-schema.py || EXIT_CODE=$?
          EXIT_CODE=${EXIT_CODE:-0}
          if [ "$EXIT_CODE" -eq 2 ]; then
            echo "::warning::profile.schema.v1.1.0.json not found; schema probe skipped."
            exit 0
          fi
          exit "$EXIT_CODE"

  scoring-formula-simulation:
    name: Scoring formula 5-sample simulation
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v6
        with:
          python-version: '3.11'

      - name: Run 5-sample simulation
        run: |
          python ci/scripts/check-scoring-formula.py || EXIT_CODE=$?
          EXIT_CODE=${EXIT_CODE:-0}
          if [ "$EXIT_CODE" -eq 2 ]; then
            echo "::warning::plugin/references/scoring-model.md not found; scoring formula check skipped."
            exit 0
          fi
          exit "$EXIT_CODE"

  scoring-model-lav-linkage:
    name: Scoring model LAV-axis linkage
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v6
        with:
          python-version: '3.11'

      - name: Run LAV linkage structural assertions
        run: |
          python ci/scripts/check-scoring-model-lav-linkage.py || EXIT_CODE=$?
          EXIT_CODE=${EXIT_CODE:-0}
          if [ "$EXIT_CODE" -eq 2 ]; then
            echo "::warning::plugin/references/scoring-model.md not found; LAV linkage check skipped."
            exit 0
          fi
          exit "$EXIT_CODE"

  changelog-parser-check:
    name: Changelog parser v1.1.0 check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v6
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install jsonschema==4.23.0

      - name: Changelog parser check
        run: python ci/scripts/check-changelog-parser.py

  sample-list-preconditions:
    name: Sample list preconditions
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v6
        with:
          python-version: '3.11'

      - name: Check sample list preconditions
        run: python ci/scripts/check-sample-list-preconditions.py

  audit-goldens-check:
    name: Audit goldens formula + bucket check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v6
        with:
          python-version: '3.11'

      - name: Check audit goldens
        run: |
          python ci/scripts/check-audit-goldens.py || EXIT_CODE=$?
          EXIT_CODE=${EXIT_CODE:-0}
          if [ "$EXIT_CODE" -eq 2 ]; then
            echo "::warning::ci/fixtures/audit-goldens/ not found; audit-goldens check skipped."
            exit 0
          fi
          exit "$EXIT_CODE"

  audit-drift-aware-check:
    name: Audit drift-aware recommendation structure
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v6
        with:
          python-version: '3.11'

      - name: Run drift-aware validator
        run: python ci/scripts/check-audit-drift-aware.py

  scoring-contract-consistency:
    name: Scoring contract ID consistency
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v6
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install pyyaml==6.0.2

      - name: Run scoring-contract consistency validator
        run: python ci/scripts/check-scoring-contract-consistency.py
